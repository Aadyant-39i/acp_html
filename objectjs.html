<!DOCTYPE html>
<html>

    <title>Object Property Example</title>
</head>

<body>


<p id="demo"></p>

<script>

var person = {
    firstName: "Aadyant",
    age: 12,
};


document.getElementById("demo").innerHTML =
person.firstName + " is " + person.age + " years old.";
</script>

</body>
</html>
