<!DOCTYPE html>
<html>

<body style="background-color: black; color:aliceblue;">

<h1>JavaScript Variables</h1>



<p id="result1"></p>
<p id="result2"></p>
<p id="result3"></p>
<p id="result4"></p>
<p id="merge1"></p>
<p id="modulus"></p>
   
<script>
    var num1 = 50;
    var num2 = 455;
    var sum = num1 + num2;

    document.getElementById("result1").innerHTML =
    "<code>The total sum of " + num1 + " and " + num2 + " is: " + sum + "</code>";
     var num1 = 891;
    var num2 = 772;
    var difference = num1 - num2;

    document.getElementById("result2").innerHTML =
    "<code>The difference between " + num1 + " and " + num2 + " is: " + difference + "</code>";
     var num1 = 8;
    var num2 = 771;
    var product = num1 * num2;

    document.getElementById("result3").innerHTML =
    "<code>The product of " + num1 + " and " + num2 + " is: " + product + "</code>";
     var num1 = 7700;
    var num2 = 762;
    var quotient = num1 / num2;

    document.getElementById("result4").innerHTML =
    "<code>The Quotient of " + num1 + " and " + num2 + " is: " + quotient + "</code>"   ;
    var name1 = "22";
    var name2 = "44";
    var merge = name1 + name2;
    document.getElementById("merge1").innerHTML =
    "<code>The merged number is: " + merge + "</code>";

     var num1 = 92;
    var num2 = 9;
    var modulus = num1 % num2;

    document.getElementById("modulus").innerHTML =
    "<code>The remainder  of " + num1 + " and " + num2 + " is: " + modulus + "</code>";
</script>
    

</body>

</html>
